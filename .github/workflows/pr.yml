name: PR

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: Build and test
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcode-select -p
          xcodebuild -version
          swift --version

      - name: Test platform-neutral logic
        run: swift test

      - name: Build iOS app shell
        run: xcodebuild -project RuckABaby.xcodeproj -scheme RuckABaby -destination 'generic/platform=iOS Simulator' CODE_SIGNING_ALLOWED=NO build

      - name: Build watchOS app shell
        run: xcodebuild -project RuckABaby.xcodeproj -scheme RuckABabyWatchApp -destination 'generic/platform=watchOS Simulator' CODE_SIGNING_ALLOWED=NO build
