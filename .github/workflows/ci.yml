name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-test-build:
    name: Lint, test, and build
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcode-select -p
          xcodebuild -version
          swift --version

      - name: Validate git hook scripts
        run: bash -n .githooks/pre-commit scripts/install-git-hooks.sh

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint Swift
        run: swiftlint --strict

      - name: Test platform-neutral logic
        run: swift test

      - name: Build iOS app shell
        run: xcodebuild -project RuckABaby.xcodeproj -scheme RuckABaby -destination 'generic/platform=iOS Simulator' CODE_SIGNING_ALLOWED=NO build

      - name: Build watchOS app shell
        run: xcodebuild -project RuckABaby.xcodeproj -scheme RuckABabyWatchApp -destination 'generic/platform=watchOS Simulator' CODE_SIGNING_ALLOWED=NO build
